name: Retag Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to recreate (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo, pdo_sqlite, pdo_mysql
          ini-values: phar.readonly=0

      - name: Build PHAR
        run: php -d phar.readonly=0 bin/build.php

      - name: Delete existing release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.event.inputs.version }} --yes 2>/dev/null || true
          git push origin :refs/tags/${{ github.event.inputs.version }} 2>/dev/null || true
          git tag -d ${{ github.event.inputs.version }} 2>/dev/null || true

      - name: Read changelog excerpt
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_BARE="${VERSION#v}"
          BODY=$(awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build source archives
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION_BARE="${VERSION#v}"
          NAME="domainhunter-${VERSION_BARE}"
          git archive --format=zip --prefix="${NAME}/" HEAD -o "builds/${NAME}.zip"
          git archive --format=tar.gz --prefix="${NAME}/" HEAD -o "builds/${NAME}.tar.gz"

      - name: Create Release on clean commit
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Domain Hunter ${{ github.event.inputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          files: |
            builds/dh.phar
            builds/domainhunter-*.zip
            builds/domainhunter-*.tar.gz
          draft: false
          prerelease: false
          target_commitish: master
