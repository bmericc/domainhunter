name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, pdo, pdo_sqlite, pdo_mysql
          ini-values: phar.readonly=0

      - name: Build PHAR
        run: php -d phar.readonly=0 bin/build.php

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Read changelog excerpt
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_BARE="${VERSION#v}"
          BODY=$(awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Domain Hunter ${{ steps.tag.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          files: builds/dh.phar
          draft: false
          prerelease: false
