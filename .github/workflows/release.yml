name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo, pdo_sqlite, pdo_mysql
          ini-values: phar.readonly=0

      - name: Build PHAR
        run: php -d phar.readonly=0 bin/build.php

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Read changelog excerpt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_BARE="${VERSION#v}"
          BODY=$(awk "/^## \[${VERSION_BARE}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build source archives
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_BARE="${VERSION#v}"
          NAME="domainhunter-${VERSION_BARE}"
          git archive --format=zip --prefix="${NAME}/" HEAD -o "builds/${NAME}.zip"
          git archive --format=tar.gz --prefix="${NAME}/" HEAD -o "builds/${NAME}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Domain Hunter ${{ steps.version.outputs.tag }}"
          body: ${{ steps.changelog.outputs.body }}
          files: |
            builds/dh.phar
            builds/domainhunter-*.zip
            builds/domainhunter-*.tar.gz
          draft: false
          prerelease: false

      - name: Upload to SourceForge
        continue-on-error: true
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_BARE="${VERSION#v}"
          SF_DIR="DomainHunter v${VERSION_BARE}"
          SF_PATH="/home/frs/project/domainhunter/${SF_DIR}"
          NAME="domainhunter-${VERSION_BARE}"
          mkdir -p ~/.ssh
          echo "$SF_SSH_KEY" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts 2>/dev/null
          {
            echo "mkdir \"${SF_PATH}\""
            echo "put builds/dh.phar \"${SF_PATH}/dh.phar\""
            echo "put builds/${NAME}.zip \"${SF_PATH}/${NAME}.zip\""
            echo "put builds/${NAME}.tar.gz \"${SF_PATH}/${NAME}.tar.gz\""
          } | sftp -i ~/.ssh/sf_key bmericc,domainhunter@frs.sourceforge.net
