<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 76" width="150" height="76" role="img" aria-label="Domain Hunter">
  <title>Domain Hunter</title>

  <g fill="none" stroke="#111" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">

    <!-- CENTER SHAFT: tek kesintisiz çizgi — uçtan crossbar'a kadar -->
    <line x1="33" y1="10" x2="33" y2="63"/>
    <!-- center tip -->
    <polyline points="29,16  33,10  37,16"/>

    <!-- LEFT PRONG -->
    <line x1="17" y1="22" x2="17" y2="46"/>
    <!-- left tip -->
    <polyline points="13,28  17,22  21,28"/>

    <!-- RIGHT PRONG -->
    <line x1="49" y1="22" x2="49" y2="46"/>
    <!-- right tip -->
    <polyline points="45,28  49,22  53,28"/>

    <!-- CURVED BASE: sol prong dibinden → merkez shaft üzerinden (y=58) → sağ prong dibine -->
    <path d="M 17,46 C 17,59 33,59 33,59 C 33,59 49,59 49,46"/>

    <!-- T-CROSSBAR -->
    <line x1="24" y1="63" x2="42" y2="63"/>
    <line x1="24" y1="59" x2="24" y2="67"/>
    <line x1="42" y1="59" x2="42" y2="67"/>

  </g>

  <text x="60" y="60"
        font-family="'Liberation Mono','Courier New',Courier,monospace"
        font-size="64"
        font-weight="700"
        fill="#111"
        letter-spacing="2">DH</text>

</svg>
