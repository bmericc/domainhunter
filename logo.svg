<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 68" width="150" height="68" role="img" aria-label="Domain Hunter">
  <title>Domain Hunter</title>

  <g fill="none" stroke="#111" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

    <!-- CENTER SHAFT -->
    <line x1="33" y1="17" x2="33" y2="60"/>
    <polyline points="30.2,21.2  33,17  35.8,21.2"/>

    <!-- LEFT PRONG -->
    <line x1="21.7" y1="25.5" x2="21.7" y2="42.4"/>
    <polyline points="18.9,29.7  21.7,25.5  24.5,29.7"/>

    <!-- RIGHT PRONG -->
    <line x1="44.3" y1="25.5" x2="44.3" y2="42.4"/>
    <polyline points="41.5,29.7  44.3,25.5  47.1,29.7"/>

    <!-- CURVED BASE -->
    <path d="M 21.7,42.4 C 21.7,51.5 33,51.5 33,51.5 C 33,51.5 44.3,51.5 44.3,42.4"/>

    <!-- T-CROSSBAR -->
    <line x1="26.7" y1="60" x2="39.3" y2="60"/>
    <line x1="26.7" y1="57.2" x2="26.7" y2="62.8"/>
    <line x1="39.3" y1="57.2" x2="39.3" y2="62.8"/>

  </g>

  <!-- DH text: baseline y=60, cap top ≈ y=17 -->
  <text x="55" y="60"
        font-family="'Liberation Mono','Courier New',Courier,monospace"
        font-size="64"
        font-weight="700"
        fill="#111"
        letter-spacing="2">DH</text>

</svg>
